version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mpcars-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mpcars}
      POSTGRES_USER: ${DB_USER:-mpcars}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-MpCars2026Secure!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mpcars}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mpcars-network

  redis:
    image: redis:7-alpine
    container_name: mpcars-redis
    volumes:
      - redis_data:/data
    networks:
      - mpcars-network

  backend:
    build: ./backend
    container_name: mpcars-api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mpcars}:${DB_PASSWORD:-MpCars2026Secure!}@postgres:5432/${POSTGRES_DB:-mpcars}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-mpcars-secret-key-2024-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - backend_pdfs:/app/storage/pdfs
      - backend_backups:/app/storage/backups
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - mpcars-network

  celery:
    build: ./backend
    container_name: mpcars-celery
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mpcars}:${DB_PASSWORD:-MpCars2026Secure!}@postgres:5432/${POSTGRES_DB:-mpcars}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-mpcars-secret-key-2024-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - backend_pdfs:/app/storage/pdfs
      - backend_backups:/app/storage/backups
    depends_on:
      - backend
      - redis
    networks:
      - mpcars-network
    command: celery -A app.tasks.celery_app worker --loglevel=info

  frontend:
    build: ./frontend
    container_name: mpcars-web
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - mpcars-network

  nginx:
    build: ./nginx
    container_name: mpcars-proxy
    ports:
      - "8090:80"
      - "8444:443"
    depends_on:
      - backend
      - frontend
    networks:
      - mpcars-network

  portainer:
    image: portainer/portainer-ce:latest
    container_name: mpcars-portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - mpcars-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mpcars-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@mpcars.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "8085:80"
    depends_on:
      - postgres
    networks:
      - mpcars-network

volumes:
  postgres_data:
  redis_data:
  portainer_data:
  backend_pdfs:
  backend_backups:

networks:
  mpcars-network:
    driver: bridge
