version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mpcars_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mpcars}
      POSTGRES_USER: ${DB_USER:-mpcars}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SuaSenhaSegura123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mpcars}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mpcars-network

  redis:
    image: redis:7-alpine
    container_name: mpcars_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mpcars-network

  backend:
    build: ./backend
    container_name: mpcars_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mpcars}:${DB_PASSWORD:-SuaSenhaSegura123}@postgres:5432/${POSTGRES_DB:-mpcars}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ./backend:/app
      - backend_pdfs:/app/storage/pdfs
      - backend_backups:/app/storage/backups
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - mpcars-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery:
    build: ./backend
    container_name: mpcars_celery
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mpcars}:${DB_PASSWORD:-SuaSenhaSegura123}@postgres:5432/${POSTGRES_DB:-mpcars}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ./backend:/app
      - backend_pdfs:/app/storage/pdfs
      - backend_backups:/app/storage/backups
    depends_on:
      - backend
      - redis
    networks:
      - mpcars-network
    command: celery -A app.tasks.celery_app worker --loglevel=info

  frontend:
    build: ./frontend
    container_name: mpcars_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - mpcars-network

  nginx:
    build: ./nginx
    container_name: mpcars_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - mpcars-network

  portainer:
    image: portainer/portainer-ce:latest
    container_name: mpcars_portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - mpcars-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mpcars_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@mpcars.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - mpcars-network

volumes:
  postgres_data:
  redis_data:
  portainer_data:
  backend_pdfs:
  backend_backups:

networks:
  mpcars-network:
    driver: bridge
