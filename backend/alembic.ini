# Alembic Configuration

# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(asctime)s_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current working directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to datetimezone.timezone constructor.
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field when generating migration filenames
# compared against the operating system limit of 30 for most filesystems
# this affects the length of file names generated for migrations from autogenerate
# as it concatenates a timestamp with the "slug" field.%%(slug)s.py
# default to calculating intelligently what the maximum length should be and disabling truncation
# max_identifier_length = -1

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S


# The SQLAlchemy URL is read from environment or app config
# This is a fallback value - it will be overridden by the env.py script
sqlalchemy.url = postgresql://mpcars:mpcars@postgres:5432/mpcars
